<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="header">
        <div>
          <h1>Password Generator</h1>
          <p>Create a secure random password.</p>
        </div>

        <button id="themeToggle" class="theme-btn">🌙</button>
      </div>

      <div class="result-box">
        <input type="text" id="password" readonly placeholder="Your password" />
        <button id="copyBtn">Copy</button>
      </div>

      <div class="setting">
        <label for="length">Password Length</label>
        <input type="number" id="length" min="4" max="30" value="12" />
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="uppercase" checked />
          Uppercase Letters
        </label>

        <label>
          <input type="checkbox" id="lowercase" checked />
          Lowercase Letters
        </label>

        <label>
          <input type="checkbox" id="numbers" checked />
          Numbers
        </label>

        <label>
          <input type="checkbox" id="symbols" checked />
          Symbols
        </label>
      </div>

      <button id="generateBtn" class="generate-btn">Generate Password</button>

      <p id="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
